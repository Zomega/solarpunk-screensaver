<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>HUD Connectors</title>
<style>
  body {
    margin: 0;
    height: 100vh;
    background: #043c35;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .hud {
    position: relative;
    width: 800px;
    height: 500px;
    background: rgba(255,255,255,0.02);
    border: 2px solid #12e0d0;
    border-radius: 12px;
  }
  .panel {
    position: absolute;
    width: 150px;
    height: 100px;
    background: rgba(255,255,255,0.05);
    border: 2px solid #12e0d0;
    border-radius: 8px;
  }
  #p1 { top: 40px; left: 40px; }
  #p2 { bottom: 40px; right: 40px; }

  svg {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
  }

  .connector {
    stroke: #12e0d0;
    stroke-width: 3px;
    fill: none;
    filter: drop-shadow(0 0 6px rgba(18,224,208,0.4));
  }
</style>
</head>
<body>
<div class="hud">
  <div id="p1" class="panel"></div>
  <div id="p2" class="panel"></div>

  <svg id="wires"></svg>
</div>

<script>
function connect(el1, el2) {
  const r1 = el1.getBoundingClientRect();
  const r2 = el2.getBoundingClientRect();
  const parent = el1.closest('.hud').getBoundingClientRect();

  // start from center-right of first, to center-left of second
  const x1 = r1.right - parent.left;
  const y1 = r1.top + r1.height/2 - parent.top;
  const x2 = r2.left - parent.left;
  const y2 = r2.top + r2.height/2 - parent.top;

  // path with 45°-ish corners
  const midX = (x1 + x2)/2;
  const d = `M ${x1},${y1} L ${midX},${y1} L ${midX},${y2} L ${x2},${y2}`;

  return d;
}

function draw() {
  const p1 = document.getElementById("p1");
  const p2 = document.getElementById("p2");
  const wires = document.getElementById("wires");

  wires.innerHTML = ""; // clear old
  const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
  path.setAttribute("d", connect(p1,p2));
  path.setAttribute("class", "connector");
  wires.appendChild(path);
}

window.addEventListener("resize", draw);
window.addEventListener("load", draw);
</script>
</body>
</html>
