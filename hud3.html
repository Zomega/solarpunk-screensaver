<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Screensaver Scratchpad</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: "Roboto", sans-serif;
      color: #3bffda;
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #028366ff;
    }
    #mainframe {
      position: fixed;
      left: auto;
      top: auto;
      /* TODO: This should be dynamic. For right now it's fixed to help match the layout. */
      width: calc(1110px - 48px);
      height: calc(694px - 48px);
      padding: 24px;
      padding-top: 16px; /*TODO: consider unifying.*/
    }
    #testtext {
      position: absolute;
      top: 16px;
      left: 24px;
      text-transform: uppercase;
      font-size: 48px;
      margin: 0;
    }
    #ring {
      /*TODO: Should parent to #mainframe*/
      position: fixed;
      left: auto;
      /*TODO: This should be baked in better.*/
      top: calc(50% - (564.8px / 2) - 20px);
      width: 564.8px;
      height: 564.8px;
      transform-origin: center;
      filter: url(#tint);
    }
    #worldmap {
      /* TODO migrate to grid */
      top:286px;
      left:28px;
      width: 260px;
      height: 162px;
      position: absolute;
      filter: url(#tint);
    }
    #bl-graph {
        position: absolute;
        left:28px;
        bottom: 24px;
        width: 254px;
        height: 178px;
    }
    #br-graph {
        position: absolute;
        right: 24px;
        bottom: 80px;
        width: 242px;
        height: 136px;
    }
    #br-percentages {
      position: absolute;
      right: 24px;
      bottom: 24px;
      width: 194px;
      height: 24px;
      padding: 7px 24px;
      line-height: 24px;
      background-color: #ff000066;
      font-size: 24px;
    }
    #trace-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none; /* Crucial: Allows clicks to pass through */
      z-index: 9998; /* Just below #gradient-overlay */
    }
    #gradient-overlay {
      position: fixed;
      top: 0;
      left: 0;
      opacity: 46.1351%;
      z-index: 9999;
      pointer-events: none;
      width: 100vw;
      height: 100vh;
    }

    #mockup {
      position: fixed;
      top: 0;
      left:auto;
      width: auto;
      height: 100vh;
      opacity: 1;
      z-index: -999;
      filter: url(#tint);
    }

    .highlightable-element {
        padding: 20px;
        margin: 20px;
        border: 1px solid #ccc;
    }

        #box1 {
            background-color: #f0f8ff;
        }

        #box2 {
            background-color: #fff0f5;
        }

        #box3 {
            background-color: #f5fffa;
        }
  </style>
</head>
<body>
  <svg width="0" height="0">
    <filter id="tint" color-interpolation-filters="sRGB">
      <!-- TODO: This probably needs a rework to produce the correct -->
      <feColorMatrix id="tintMatrix" type="matrix" values=""/>
      <feComponentTransfer>
        <feFuncA type="identity"/>
      </feComponentTransfer>
    </filter>
  </svg>
  <div id="mainframe">
    <div id="testtext">Profile 58%</div>
    <img id="worldmap" src="world_map.svg" alt="World Map">
    <img id="bl-graph" src="graph2_placeholder.svg" alt="Graph2 Placeholder">
    <img id="br-graph" src="graph1_placeholder.svg" alt="Graph1 Placeholder">
    <div id=br-percentages>60%&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;20%</div>
  </div>

  <!-- TODO: Integrate inside mainframe -->
  <img id="ring" src="screensaver-ring.svg" alt="Ring">

  <svg id="trace-overlay" xmlns="http://www.w3.org/2000/svg"></svg>
  <img id="gradient-overlay" src="screensaver-overlay.svg" alt="Overlay">

  <img id="mockup" src="screensaver-mockup.png" alt="Mockup">

  <script>
    function hexToRgb(hex) {
      hex = hex.replace(/^#/, "");
      if (hex.length === 3) hex = hex.split("").map(c => c + c).join("");
      const num = parseInt(hex, 16);
      return { r: (num >> 16) & 255, g: (num >> 8) & 255, b: num & 255 };
    }

    function setTintColor(hex) {
      const { r, g, b } = hexToRgb(hex);
      const rf = (r / 255).toFixed(3);
      const gf = (g / 255).toFixed(3);
      const bf = (b / 255).toFixed(3);

      const lumR = 0.2126;
      const lumG = 0.7152;
      const lumB = 0.0722;

      // The color matrix to convert to greyscale and tint
      // TODO: This... doesn't really work. Might need to do this with two
      const values = `
        ${(lumR * rf).toFixed(3)} ${(lumG * rf).toFixed(3)} ${(lumB * rf).toFixed(3)} 0 0
        ${(lumR * gf).toFixed(3)} ${(lumG * gf).toFixed(3)} ${(lumB * gf).toFixed(3)} 0 0
        ${(lumR * bf).toFixed(3)} ${(lumG * bf).toFixed(3)} ${(lumB * bf).toFixed(3)} 0 0
        0 0 0 1 0
      `.trim().replace(/\s+/g, " ");

      document.getElementById("tintMatrix").setAttribute("values", values);
    }

    setTintColor("#3bffda");
  </script>

  <script>
    const ring = document.getElementById("ring");
    let start = null;

    function animate(timestamp) {
      if (!start) start = timestamp;
      const elapsed = (timestamp - start) / 1000; // seconds

      // t = time in radians (adjust speed here with factor)
      const t = elapsed * 2 * Math.PI / 5; // one base cycle ~5s

      // rotation in degrees using your formula
      const angle = 15 * Math.sin(t) + 15 * Math.sin(t / Math.PI);

      ring.style.transform = `rotate(${angle}deg)`;

      requestAnimationFrame(animate);
    }

    requestAnimationFrame(animate);
  </script>
  <script>
/**
 * Adds an SVG border around a given HTML element with optional offset and chamfered corners.
 * @param {string} elementId - The ID of the element to draw the border around.
 * @param {object} options - An object containing configuration options.
 * @param {number} options.offset - The distance to offset the border from the element (can be negative).
 * @param {number} options.chamferSize - The size of the chamfered corner.
 * @param {string} options.color - The stroke color for the border.
 */
function addBorderAround(elementId, options = {}) {
    const { offset = 0, chamferSize = 0, color = 'blue' } = options;

    const element = document.getElementById(elementId);
    if (!element) {
        console.error(`Element with ID "${elementId}" not found.`);
        return;
    }

    const svg = document.getElementById('trace-overlay');
    if (!svg) {
        console.error('SVG overlay not found.');
        return;
    }

    const rect = element.getBoundingClientRect();
    const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');

    let pathData = '';

    // Adjust coordinates for offset
    const x1 = rect.left - offset;
    const y1 = rect.top - offset;
    const x2 = rect.right + offset;
    const y2 = rect.bottom + offset;

    // A simple check to ensure chamferSize doesn't exceed half of the shortest side
    const maxChamfer = Math.min(rect.width, rect.height) / 2;
    const effectiveChamfer = Math.min(chamferSize, maxChamfer);

    // If chamferSize is 0, draw a simple rectangle
    if (effectiveChamfer === 0) {
        pathData = `
            M ${x1},${y1}
            L ${x2},${y1}
            L ${x2},${y2}
            L ${x1},${y2}
            Z
        `;
    } else {
        // Draw the chamfered path
        pathData = `
            M ${x1 + effectiveChamfer},${y1}
            L ${x2 - effectiveChamfer},${y1}
            L ${x2},${y1 + effectiveChamfer}
            L ${x2},${y2 - effectiveChamfer}
            L ${x2 - effectiveChamfer},${y2}
            L ${x1 + effectiveChamfer},${y2}
            L ${x1},${y2 - effectiveChamfer}
            L ${x1},${y1 + effectiveChamfer}
            Z
        `;
    }

    path.setAttribute('d', pathData.trim());
    path.setAttribute('fill', 'none');
    path.setAttribute('stroke', color);
    path.setAttribute('stroke-width', '3'); // TODO: Pass in in options.
    
    // Append the new path to the SVG. We no longer clear the SVG content.
    svg.appendChild(path);
}

// Example usage:
// Clear the SVG before a new set of highlights
function clearAllBorders() {
    const svg = document.getElementById('svg-overlay');
    if (svg) {
        svg.innerHTML = '';
    }
}

// Clear any previous borders first
clearAllBorders();

// TODO: Make this all work dynamically.
// TODO: Consider using tint filter on white for uniformity?
addBorderAround('mainframe', { offset: 0, chamferSize: 8, color: '#3bffda' });
addBorderAround('mainframe', { offset: 24, chamferSize: 20, color: '#3bffda' });

addBorderAround('bl-graph', { offset: 0, chamferSize: 20, color: '#3bffda' });
// TODO: also figure out inner border for bl-graph?
addBorderAround('br-graph', { offset: 0, chamferSize: 8, color: '#3bffda' });
addBorderAround('worldmap', { offset: 0, chamferSize: 8, color: '#3bffda' });

  </script>
</body>
</html>
