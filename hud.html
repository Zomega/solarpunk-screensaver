<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Futuristic HUD Mockup</title>

<!-- Optional font -->
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>
  :root{
    --bg-emerald: #053f38;        /* darkest */
    --bg-mid: #064f46;           /* mid teal/emerald */
    --neon: #12e0d0;            /* bright neon teal */
    --neon-dim: #08b2a7;
    --panel-glass: rgba(255,255,255,0.02);
    --line-width: 3px;          /* bold line weight */
    --corner-radius: 8px;
  }

  html,body{
    height:100%;
    margin:0;
    background:
      radial-gradient(1200px 600px at 10% 20%, rgba(8,80,74,0.18), transparent 10%),
      linear-gradient(180deg, rgba(4,60,53,1) 0%, var(--bg-mid) 40%, var(--bg-emerald) 100%);
    font-family: "Inter", system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial;
    -webkit-font-smoothing:antialiased;
    color:var(--neon-dim);
    display:flex;
    align-items:center;
    justify-content:center;
  }

  /* stage */
  .hud-stage{
    width: min(1100px, 94vw);
    aspect-ratio: 16 / 10;
    padding: 28px;
    box-sizing: border-box;
    position: relative;
    border-radius: 14px;
    overflow: hidden;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
    background:
      linear-gradient(180deg, rgba(255,255,255,0.02), rgba(255,255,255,0.00)),
      transparent;
    box-shadow: 0 20px 60px rgba(2,20,18,0.65), inset 0 1px 0 rgba(255,255,255,0.02);
  }

  /* screen frame border */
  .hud-stage:before{
    content:"";
    position:absolute;
    inset:12px;
    border-radius: 12px;
    pointer-events:none;
    box-shadow:
      0 0 0 2px rgba(255,255,255,0.02) inset,
      0 0 0 4px rgba(0,0,0,0.25) inset;
  }

  /* main SVG canvas */
  .hud-canvas{
    grid-column: 1 / -1;
    width:100%;
    height:100%;
    display:flex;
    align-items:center;
    justify-content:center;
    position:relative;
  }

  /* outer board */
  .board{
    width:92%;
    height:86%;
    border-radius: 10px;
    background: linear-gradient(180deg, rgba(0,0,0,0.06), rgba(0,0,0,0.12));
    position:relative;
    box-shadow: 0 8px 30px rgba(0,0,0,0.6), inset 0 0 40px rgba(0,0,0,0.35);
    overflow:visible;
  }

  /* thin neon border */
  .board:after{
    content:"";
    position:absolute;
    inset:10px;
    border-radius:8px;
    pointer-events:none;
    box-shadow: 0 0 0 var(--line-width) rgba(18,224,208,0.03) inset;
    border: var(--line-width) solid rgba(18,224,208,0.08);
    mix-blend-mode:screen;
  }

  /* SVG fills the board */
  svg{
    width:100%;
    height:100%;
    display:block;
  }

  /* neon stroke style classes below used in svg */
  .neon-line{
    stroke: var(--neon);
    stroke-width: var(--line-width);
    stroke-linecap:round;
    stroke-linejoin:round;
    fill: none;
    filter: drop-shadow(0 0 8px rgba(18,224,208,0.22));
  }

  .neon-thin{
    stroke: var(--neon);
    stroke-width: 1.25px;
    fill:none;
    opacity:0.95;
    filter: drop-shadow(0 0 6px rgba(18,224,208,0.14));
  }

  .neon-dim{
    stroke: var(--neon-dim);
    stroke-width: 1.2px;
    fill:none;
    opacity:0.9;
  }

  .panel{
    stroke: var(--neon);
    stroke-width: 1.5px;
    fill: rgba(10,20,20,0.06);
    filter: drop-shadow(0 6px 18px rgba(0,0,0,0.6));
  }

  .text{
    fill: var(--neon-dim);
    font-size: 13px;
    font-weight:400;
    letter-spacing:0.08em;
    text-transform:uppercase;
  }

  /* small decorative elements */
  .dot{
    fill:var(--neon);
    filter: drop-shadow(0 0 6px rgba(18,224,208,0.35));
  }

  /* animated glow on the center ring */
  @keyframes ringPulse {
    0% { filter: drop-shadow(0 0 4px rgba(18,224,208,0.12)); transform: scale(1); opacity:1;}
    50% { filter: drop-shadow(0 0 14px rgba(18,224,208,0.22)); transform: scale(1.002); opacity:0.98;}
    100% { filter: drop-shadow(0 0 4px rgba(18,224,208,0.12)); transform: scale(1); opacity:1;}
  }

  .ring-anim{
    transform-origin:center;
    animation: ringPulse 3.6s ease-in-out infinite;
  }

  /* small scanning sweep */
  .sweep {
    stroke: rgba(18,224,208,0.12);
    stroke-width: 12;
    stroke-linecap: round;
    filter: blur(8px);
    transform-origin: center;
    animation: sweepRotate 6s linear infinite;
  }
  @keyframes sweepRotate {
    from { transform: rotate(0deg); }
    to   { transform: rotate(360deg); }
  }

  /* lower-right credits/legend */
  .legend{
    position:absolute;
    right:24px;
    bottom:18px;
    color:var(--neon-dim);
    font-size:12px;
    opacity:0.95;
  }

  /* responsive small screens: scale down */
  @media (max-width: 820px){
    :root{ --line-width: 2px; }
    .hud-stage{ padding:16px; }
  }
</style>
</head>
<body>

<div class="hud-stage" role="img" aria-label="Futuristic monitor interface mockup">
  <div class="hud-canvas">
    <div class="board" aria-hidden="false">
      <!-- Use SVG for crisp scalable lines -->
      <svg viewBox="0 0 1200 760" preserveAspectRatio="xMidYMid meet" xmlns="http://www.w3.org/2000/svg">
        <!-- Outer margin frame -->
        <rect x="20" y="20" width="1160" height="720" rx="8" ry="8" class="neon-thin" opacity="0.18"/>

        <!-- Left column small panels -->
        <g id="left-panels" transform="translate(48,48)">
          <rect x="0" y="0" width="320" height="120" rx="10" class="panel" />
          <rect x="0" y="150" width="320" height="160" rx="10" class="panel" />
          <rect x="0" y="340" width="320" height="120" rx="10" class="panel" />
        </g>

        <!-- Right column small panels -->
        <g id="right-panels" transform="translate(832,48)">
          <rect x="0" y="0" width="320" height="120" rx="10" class="panel" />
          <rect x="0" y="150" width="320" height="120" rx="10" class="panel" />
          <rect x="0" y="300" width="320" height="220" rx="10" class="panel" />
        </g>

        <!-- Bottom small widgets -->
        <g id="bottom-widgets" transform="translate(48,520)">
          <rect x="0" y="0" width="160" height="120" rx="10" class="panel" />
          <rect x="200" y="0" width="160" height="120" rx="10" class="panel" />
          <rect x="420" y="0" width="420" height="120" rx="10" class="panel" />
        </g>

        <!-- CENTRAL HUD: concentric rings -->
        <g transform="translate(600,380)">
          <!-- faint guide rings (dim) -->
          <g class="ring-anim">
            <circle r="220" class="neon-thin" opacity="0.24"/>
            <circle r="188" class="neon-thin" opacity="0.34"/>
            <circle r="156" class="neon-thin" opacity="0.46"/>
            <circle r="124" class="neon-thin" opacity="0.56"/>
            <circle r="92"  class="neon-thin" opacity="0.66"/>
            <circle r="60"  class="neon-thin" opacity="0.78"/>
            <circle r="28"  class="neon-line" />
          </g>

          <!-- crosshair -->
          <line x1="-260" y1="0" x2="-36" y2="0" class="neon-line" opacity="0.9"/>
          <line x1="260" y1="0" x2="36" y2="0" class="neon-line" opacity="0.9"/>
          <line x1="0" y1="-260" x2="0" y2="-36" class="neon-line" opacity="0.9"/>
          <line x1="0" y1="260" x2="0" y2="36" class="neon-line" opacity="0.9"/>

          <!-- small ticks on rings -->
          <g class="neon-dim" stroke-width="2">
            <!-- a few sample ticks -->
            <line x1="220" y1="-6" x2="220" y2="6"/>
            <line x1="-220" y1="-6" x2="-220" y2="6"/>
            <line x1="6" y1="220" x2="-6" y2="220"/>
            <line x1="6" y1="-220" x2="-6" y2="-220"/>
          </g>

          <!-- sweeping glow -->
          <g transform="rotate(0)">
            <path class="sweep" d="M -220 0 A 220 220 0 0 1 220 0" vector-effect="non-scaling-stroke" />
          </g>
        </g>

        <!-- small accent lines and icons inside panels -->
        <g class="neon-thin" stroke-linecap="round" stroke-dasharray="6 10">
          <!-- left-top bar chart -->
          <g transform="translate(78,62)">
            <rect x="10" y="12" width="18" height="40" rx="2" />
            <rect x="36" y="6" width="18" height="46" rx="2" />
            <rect x="62" y="22" width="18" height="30" rx="2" />
            <rect x="88" y="2" width="18" height="50" rx="2" />
          </g>

          <!-- left map silhouette (stylized) -->
          <g transform="translate(78,210)" opacity="0.55">
            <path d="M6 50 Q40 10 120 36 Q180 60 260 24 Q340 6 360 34 Q390 70 310 82 Q240 96 160 86 Q100 74 40 90 Z" fill="none"/>
          </g>

          <!-- bottom line graphs -->
          <g transform="translate(520,568)">
            <polyline points="-28,50 -10,32 16,40 60,10 96,38 152,22 188,44" fill="none" stroke-width="2"/>
          </g>

          <!-- right graph -->
          <g transform="translate(896,448)">
            <polyline points="10,40 30,18 54,26 86,10 120,34 160,8" fill="none" stroke-width="2"/>
          </g>
        </g>

        <!-- textual captions (SVG text) -->
        <g class="text" fill="var(--neon-dim)" font-family="Inter, Arial" font-weight="600">
          <text x="70" y="40" font-size="12">PROFILE</text>
          <text x="926" y="40" font-size="12">STATUS</text>
          <text x="926" y="190" font-size="12">20%</text>
          <text x="70" y="214" font-size="12">WORLD</text>
        </g>

        <!-- a few neon dots for flavor -->
        <circle cx="320" cy="56" r="4" class="dot"/>
        <circle cx="880" cy="60" r="4" class="dot"/>
        <circle cx="640" cy="700" r="3" class="dot" opacity="0.9"/>
      </svg>
    </div>

    <div class="legend" aria-hidden="true">HUD Mock • bold lines • emerald background</div>
  </div>
</div>

<script>
  // small nicety: let user toggle sweep animation intensity with spacebar
  (function(){
    const sweep = document.querySelector('.sweep');
    if(!sweep) return;

    let slowed = false;
    window.addEventListener('keydown', (e)=>{
      if(e.code === 'Space'){
        e.preventDefault();
        slowed = !slowed;
        sweep.style.animationDuration = slowed ? '18s' : '6s';
      }
    });
  })();
</script>

</body>
</html>
